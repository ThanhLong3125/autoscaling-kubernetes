apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-pdf-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: invoice-pdf-api
  template:
    metadata:
      labels:
        app: invoice-pdf-api
    spec:
      containers:
        - name: invoice-pdf-api
          image: asia-southeast1-docker.pkg.dev/project-ff40902e-1aa9-44fe-bb1/invoice-repo/invoice-pdf-api:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
